server:
  port: 9100
  read_timeout: 15s
  write_timeout: 15s
  enable_auth: false
  auth_token: "your-secret-token-here"

collector:
  interval: 5s
  enable_cpu: true
  enable_memory: true
  enable_disk: true
  enable_network: true
  enable_process: false
  process_limit: 10
  disk_mount_points:
    []
    # - "/"
    # - "/home"

report:
  enabled: true
  mode: "rabbitmq" # "http", "rabbitmq", "both"
  interval: 5s
  timeout: 5s

  # HTTP 模式設定
  http:
    endpoint: "http://localhost:8080/api/metrics/collect"

  # RabbitMQ 模式設定
  rabbitmq:
    url: "amqp://guest:guest@localhost:5672/"
    exchange: "host-metrics"
    exchange_type: "topic"
    routing_key_template: "host.metrics"
    durable: true
    auto_delete: false
